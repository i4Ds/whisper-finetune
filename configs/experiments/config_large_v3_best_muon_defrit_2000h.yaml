# Large-v3 Muon DE/FR/IT downsized run.
# Fixed full dataset: i4ds/swiss-german-city-sentences_v2 (all rows, de_ch).
# Target sampled mix: 2000h per de/fr/it language at ~30s/sample (240000 rows/language).
# Sampled DE priority: VoxPopuli > Mozilla Common Voice. SRG DE is not sampled in this family.
# Sampled FR/IT priority: VoxPopuli > SRG V4. No groupby sampling, so unavailable rows cap safely without replacement.
# Full row metadata checked: VoxPopuli de/fr/it=21400/27043/11334.

model:
  init_name: large-v3
  bfloat16: false
  lora: false
  lora_config:
    rank: 16
    lora_alpha: 32
    lora_dropout: 0.1
dataset:
  train_datasets: [i4ds/swiss-german-city-sentences_v2, i4ds/voxpopuli-defrit, i4ds/mozilla-common-voice-de-whisper, i4ds/voxpopuli-defrit, i4ds/SRG_V4_whisper-prep_v2, i4ds/voxpopuli-defrit, i4ds/SRG_V4_whisper-prep_v2]
  select_n_per_t_ds: [null, 21400, 193682, 27043, 212957, 11334, 228666]
  groupby_col: [null, null, null, null, null, null, null]
  val_datasets: [i4ds/mozilla-common-voice-de-whisper, i4ds/mozilla-common-voice-it-whisper, i4ds/mozilla-common-voice-fr-whisper, i4ds/voxpopuli-defrit, i4ds/SRG_V4_whisper]
  val_dataset_names: [cv_de, cv_it, cv_fr, voxpopuli_defrit, srg_v4]
  select_n_per_v_ds: [100, 100, 100, 100, 100]
  train_split_name: train
  valid_split_name: validation
  no_timestamp_training: true
  max_prompt_length: 223
  prompt_use_rate: 0.5
  no_timestamp_rate: 0.5
  batch_size: 32
  batch_size_eval: 32
  select_language_tag: [null, [de], null, [fr], [fr], [it], [it]]
  drop_last: true
lr_scheduler:
  type: cosine
  warmup_steps: 64
optimizer:
  type: adamw
  muon: true
  8bit: false
  muon_ndim_threshold: 2
  muon_params:
    lr: 2.0e-05
    momentum: 0.95
    weight_decay: 0.01
  params:
    lr: 2.0e-05
    weight_decay: 0.01
    betas: [0.9, 0.98]
    eps: 1.0e-06
    amsgrad: false
training:
  accum_grad_steps: 8
  label_smoothing: 0.1
  train_only_decoder: false
  train_only_encoder: false
  max_grad_norm: 1.0
  stochastic_depth: 0.1
  epochs: 2
  eval_steps: 0.1
  save_all_checkpoints: false
  max_train_loss: 25
  mixed_precision_training: true
  mp_dtype: fp16
  gradient_checkpointing_encoder: true
  gradient_checkpointing_encoder_last_only: false
  gradient_checkpointing_decoder: true
augmentation:
  spec_augment:
    apply: true
    time_mask_param: 100
    p: 1.0
    freq_mask_param: 43
    time_warp_w: 80
  deep_spec_augment:
    apply: true
    time_mask_param: 100
    freq_mask_param: 43
    layer_indices: null
  bpe_dropout: 0.0
  extremes_spec_augment:
    apply: false
    low_freq_range: 10
    high_freq_range: 20
  audio_augment:
    apply_office_aug: false
    apply_baseline_aug: false
    apply_advanced_aug: false
    time_stretch:
      min_rate: 0.75
      max_rate: 1.25
seed: 42
save_dir: /scicore/home/graber0001/GROUP/stt/data_nobackup/whisper/training_outputs
