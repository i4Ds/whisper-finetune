# 4-GPU DDP run derived from configs/config_large_v3_best_muon.yaml.
# Full training data, no train downsampling, and no 28-second validation sets.
#
# Submitted with:
#   sbatch --job-name=whisper_muon_ddp4_global_accum --gres=gpu:4 --cpus-per-task=32 sc_sbatch.sh configs/config_large_v3_best_muon_ddp4.yaml
#
# sc_sbatch.sh detects the allocated GPUs and launches:
#   torchrun --standalone --nproc_per_node="${NPROC}" src/whisper_finetune/scripts/finetune.py --config "$1"

ddp:
  enabled: true
  launcher: torchrun
  requested_gpus: 4
  sbatch_script: sc_sbatch.sh
  sbatch_command: sbatch --job-name=whisper_muon_ddp4_global_accum --gres=gpu:4 --cpus-per-task=32 sc_sbatch.sh configs/config_large_v3_best_muon_ddp4.yaml
  accum_grad_steps_semantics: global
  local_accum_grad_steps_on_4_gpus: 2
  effective_batch_on_4_gpus: 256  # batch_size 32 * local_accum 2 * world_size 4

model:
  init_name: large-v3
  bfloat16: False

  lora: False
  lora_config:
    rank: 16
    lora_alpha: 32
    lora_dropout: 0.1

dataset:
  train_datasets: [
    i4ds/SRG_V4_whisper-prep_v2,
    i4ds/mozilla-common-voice-de-whisper,
    i4ds/mozilla-common-voice-it-whisper,
    i4ds/mozilla-common-voice-fr-whisper,
    i4ds/voxpopuli-defrit,
    i4ds/whisper-spc_r-v2,
    i4ds/srf_podcast_v2,
    i4ds/swiss-german-city-sentences_v2,
    i4ds/sg_corpus_whisper_v2
  ]
  select_n_per_t_ds: [null, null, null, null, null, null, null, null, null]
  groupby_col: [null, null, null, null, null, null, null, null, null]

  val_datasets: [
    i4ds/mozilla-common-voice-de-whisper,
    i4ds/mozilla-common-voice-it-whisper,
    i4ds/mozilla-common-voice-fr-whisper,
    i4ds/voxpopuli-defrit,
    i4ds/SRG_V4_whisper,
    i4ds/sg_corpus_whisper_v2,
    i4ds/swiss-german-city-sentences_val,
  ]
  val_dataset_names: [
    cv_de,
    cv_it,
    cv_fr,
    voxpopuli_defrit,
    srg_v4,
    sg_corp,
    swiss_german_city_sentences,
  ]
  select_n_per_v_ds: [100, 100, 100, 100, 100, 100, 100]

  train_split_name: train
  valid_split_name: validation

  no_timestamp_training: True
  max_prompt_length: 223
  prompt_use_rate: 0.5
  no_timestamp_rate: 0.5

  batch_size: 32
  batch_size_eval: 32
  drop_last: True

lr_scheduler:
  type: cosine
  warmup_steps: 64

optimizer:
  type: adamw
  muon: True
  8bit: False
  muon_ndim_threshold: 2
  muon_params:
    lr: 0.00002
    momentum: 0.95
    weight_decay: 0.01
  params:
    lr: 0.00002
    weight_decay: 0.01
    betas: [0.9, 0.98]
    eps: 0.000001
    amsgrad: False

training:
  accum_grad_steps: 8
  label_smoothing: 0.1
  train_only_decoder: False
  train_only_encoder: False
  max_grad_norm: 1.0
  stochastic_depth: 0.1
  epochs: 2
  eval_steps: 0.1
  save_all_checkpoints: False
  max_train_loss: 25
  mixed_precision_training: True
  mp_dtype: fp16
  gradient_checkpointing_encoder: True
  gradient_checkpointing_encoder_last_only: False
  gradient_checkpointing_decoder: True

augmentation:
  spec_augment:
    apply: True
    time_mask_param: 100
    p: 1.0
    freq_mask_param: 43
    time_warp_w: 80

  deep_spec_augment:
    apply: True
    time_mask_param: 100
    freq_mask_param: 43
    layer_indices: null

  bpe_dropout: 0.0

  extremes_spec_augment:
    apply: False
    low_freq_range: 10
    high_freq_range: 20

  audio_augment:
    apply_office_aug: False
    apply_baseline_aug: False
    apply_advanced_aug: False

    time_stretch:
      min_rate: 0.75
      max_rate: 1.25

seed: 42
save_dir: /scicore/home/graber0001/GROUP/stt/data_nobackup/whisper/training_outputs
